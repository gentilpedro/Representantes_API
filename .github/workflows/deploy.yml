name: Deploy API

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Josapar.Api/Josapar.Api.csproj

      - name: Build
        run: dotnet build src/Josapar.Api/Josapar.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/Josapar.Api/Josapar.Api.csproj -c Release -o publish

      - name: Inject production secrets
        run: |
          jq --arg cs "${{ secrets.PROD_POSTGRES_CONNECTION_STRING }}" \
             --arg jwt "${{ secrets.PROD_JWT_SIGNING_KEY }}" \
             --arg swaggerUser "${{ secrets.PROD_SWAGGER_USERNAME }}" \
             --arg swaggerPassword "${{ secrets.PROD_SWAGGER_PASSWORD }}" \
             '.ConnectionStrings.Postgres = $cs | .Jwt.SigningKey = $jwt | .Swagger.Username = $swaggerUser | .Swagger.Password = $swaggerPassword' \
             publish/appsettings.Production.json > publish/appsettings.Production.json.tmp
          mv publish/appsettings.Production.json.tmp publish/appsettings.Production.json

      - name: Take app offline (release IIS file locks)
        run: |
          echo "App temporarily offline for deployment." > app_offline.htm
          curl --ftp-pasv -T app_offline.htm --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" "ftp://${{ secrets.FTP_SERVER }}/wwwroot/app_offline.htm"

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /wwwroot/

      - name: Bring app back online
        run: |
          curl --ftp-pasv --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" -Q "DELE /wwwroot/app_offline.htm" "ftp://${{ secrets.FTP_SERVER }}/"