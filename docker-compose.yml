services:
  postgres:
    image: postgres:16
    container_name: josapar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-josapar}
      POSTGRES_USER: ${POSTGRES_USER:-josapar_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - josapar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-josapar_app} -d ${POSTGRES_DB:-josapar}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  josapar_postgres_data:
